# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Finalize Changelog

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-**"

permissions:
  contents: write

jobs:
  finalize-changelog:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Replace WORK IN PROGRESS with version in both READMEs
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          export VERSION=${VERSION#v}
          export DATE=$(date +%Y-%m-%d)
          echo "Finalizing changelog for $VERSION ($DATE)"
          echo "$VERSION" > /tmp/version.txt
          echo "$DATE" > /tmp/date.txt
          # The following line decodes and runs an embedded Python script (base64-encoded
          # to avoid YAML/heredoc parsing issues). The script replaces the WORK IN PROGRESS
          # heading in both READMEs with the release version and date, and adds a fresh
          # WIP block to README.md.
          echo "" | base64 -d | python3

      - name: Commit finalized changelogs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (
            git add README.md README.de.md &&
            git commit -m "chore: finalize changelog for ${{ github.ref_name }} [skip ci]" &&
            git push origin main
          )